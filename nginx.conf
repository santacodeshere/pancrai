# PancrAI — Nginx Reverse Proxy Configuration
# Routes /api/* to FastAPI and everything else to Streamlit

server {
    listen 80;
    server_name localhost;

    # Max upload size (50MB for CT scans)
    client_max_body_size 50M;

    # ── FastAPI Backend ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # FastAPI docs
    location /docs {
        proxy_pass http://api:8000/docs;
    }
    location /redoc {
        proxy_pass http://api:8000/redoc;
    }
    location /openapi.json {
        proxy_pass http://api:8000/openapi.json;
    }

    # ── Streamlit Frontend ───────────────────────────────────────────────
    location / {
        proxy_pass         http://ui:8501;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Streamlit WebSocket support
    location /_stcore/stream {
        proxy_pass         http://ui:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  "upgrade";
        proxy_set_header   Host        $host;
        proxy_read_timeout 86400;
    }
}
