[pytest]
# PancrAI Test Configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests requiring a running server
    gpu: marks tests that require CUDA

# Output
addopts =
    -v
    --tb=short
    --no-header
    -p no:warnings

# Logging
log_cli = true
log_cli_level = WARNING
